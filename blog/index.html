---
layout: default
title: "Blog"
---

<h2>My Blog Posts</h2>

<ul>
  {% for post in site.posts %}
    <li>
      <span style="color: #666; margin-right: 15px;">{{ post.date | date: "%b %d, %Y" }}</span>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    </li>
  {% endfor %}
</ul>
